<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Solresol — the universal musical language. Translate, learn, and play with the 7-note constructed language.">
  <title>Solresol</title>
  <link rel="stylesheet" href="./styles/base.css">
