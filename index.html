<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solresol Translator & Dictionary</title>
<link rel="preconnect" href="https://fonts.gstatic.com" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --primary-bg: #f7f7f7;
  --primary-color: #333;
  --primary-accent: #5cb85c;
  --secondary-accent: #3f51b5;
  --container-bg: #fff;
  --box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  --border-radius: 10px;
}

body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 0;
  background-color: var(--primary-bg);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  color: var(--primary-color);
}

/* A wrapping container to center main content vertically on large screens */
.wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Main content area */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* General container style */
.container, .container2 {
  background-color: var(--container-bg);
  padding: 40px;
  border-radius: var(--border-radius);
  box-shadow: var(--box-shadow);
  max-width: 1200px;
  width: 100%;
  margin: 20px;
  text-align: center;
}

h1, h2 {
  color: #333;
  margin-top: 0;
}

/* Form and input styles */
.input-group {
  margin: 20px 0;
}

input[type="text"], textarea {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

/* Buttons */
button, input[type="submit"] {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ddd;
  background-color: var(--primary-accent);
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: background-color 0.3s ease;
}

button:hover, input[type="submit"]:hover {
  background-color: #4cae4c;
}

#translation {
  margin-top: 20px;
  padding: 10px;
  background-color: #e8eaf6;
  border: 1px solid #c5cae9;
  border-radius: 4px;
  text-align: left;
}

strong {
  color: var(--secondary-accent);
}

/* Colored notes */
.note_do { background: #c40233; color: #fff; }
.note_re { background: #e16b1a; color: #fff; }
.note_mi { background: #eac100; color: #000; }
.note_fa { background: #00a368; color: #fff; }
.note_sol { background: #00b2b0; color: #fff; }
.note_la { background: #0088bf; color: #fff; }
.note_si { background: #624579; color: #fff; }
.note_num { background: #eee; color: #000; }
.note_rep { background: #aaa; color: #444; }

/* Other backgrounds */
.tri { background: #000; color: #fff; }
.pal { background: #676767; color: #fff; }
.dou { background: #ababab; }
.seq { background: #efefef; }

.square {
  display: inline-block;
  width: 24px;
  height: 24px;
  margin: 0 2px;
  vertical-align: middle;
  border-radius: 4px;
}

.letter {
  display: block;
  text-align: center;
  line-height: 24px;
  color: white;
}

.letter.no-text {
  visibility: hidden;
}

/* Translator container */
.translator-container {
  background-color: var(--container-bg);
  max-width: 600px;
  margin: 20px auto;
  padding: 20px;
  box-shadow: var(--box-shadow);
  border-radius: 8px;
  text-align: center;
}

/* Responsive adjustments */
@media (max-width: 768px) {
  .container, .container2 {
    padding: 20px;
  }
  h1, h2 {
    font-size: 1.5em;
  }
}
</style>
<script>
// Mapping syllables to numbers and frequencies
const syllableToNumber = {
  'do': '1', 're': '2', 'mi': '3', 'fa': '4', 'sol': '5', 'la': '6', 'si': '7'
};

const syllableFrequency = {
  'do': 261.6,
  're': 293.7,
  'mi': 329.6,
  'fa': 349.2,
  'sol': 392.0,
  'la': 440.0,
  'si': 493.9
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Get word from URL
function getWordFromURL() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('word');
}

function parseMultipleWordsToNumbers(words) {
  let wordsArray = words.split(' ');
  return wordsArray.map(word => {
    let syllables = word.match(/(do|re|mi|fa|sol|la|si)/g);
    return syllables ? syllables.map(syl => syllableToNumber[syl]).join('') : '';
  }).join(' ');
}

function wrapMultipleWords(words) {
  return words.split(' ').map(word => {
    return word.replace(/(do|re|mi|fa|sol|la|si)/g, (match) => {
      return `<span class='note_${match} square letter'>${match}</span>`;
    });
  }).join(' ');
}

function createImagesForMultipleWords(words, imageFolder) {
  return words.split(' ').map(word => {
    const syllables = word.match(/(do|re|mi|fa|sol|la|si)/g);
    if (!syllables) return '';
    
    return syllables.map(syl => {
      const number = syllableToNumber[syl];
      return `<img src="${imageFolder}/${number}.png" alt="Syllable ${syl}" style="height:100px; width:50px;">`;
    }).join('');
  }).join(' ');
}

function createSquaresForMultipleWords(words, includeText, includeNumbers = false) {
  return words.split(' ').map(word => {
    return word.replace(/(do|re|mi|fa|sol|la|si)/g, (match) => {
      const number = includeNumbers ? syllableToNumber[match] : match;
      const textClass = includeText ? 'letter' : 'letter no-text';
      return `<span class='square note_${match}'><span class='${textClass}'>${number}</span></span>`;
    });
  }).join(' ');
}

// Display the word and definitions
function displayMultipleWordsAndDefinitions() {
  const word = getWordFromURL();
  if (word) {
    const searchWords = word.toLowerCase().split(' ');
    const definitions = searchWords.map(searchWord => {
      const definitionKey = Object.keys(dictionary).find(key => key.toLowerCase() === searchWord);
      return definitionKey ? dictionary[definitionKey] : 'Definition not found.';
    });

    document.getElementById('word').innerHTML = wrapMultipleWords(word) || 'No word provided';
    document.getElementById('plainWord').textContent = word || 'No word provided';
    document.getElementById('coloredSquaresWithText').innerHTML = createSquaresForMultipleWords(word, true);
    document.getElementById('coloredSquaresNoText').innerHTML = createSquaresForMultipleWords(word, false);
    document.getElementById('coloredSquaresWithNumbers').innerHTML = createSquaresForMultipleWords(word, true, true);
    document.getElementById('number').textContent = parseMultipleWordsToNumbers(word) || 'No number representation';
    document.getElementById('definition').innerHTML = definitions.join('<br><br>');

    // Update images
    document.getElementById('syllableImages').innerHTML = createImagesForMultipleWords(word, 'images');
    document.getElementById('syllableImages2').innerHTML = createImagesForMultipleWords(word, 'images2');
    document.getElementById('syllableImages3').innerHTML = createImagesForMultipleWords(word, 'images3');
    document.getElementById('syllableImages4').innerHTML = createImagesForMultipleWords(word, 'images4');
  }
}

function handleFormSubmit(event) {
  event.preventDefault();
  const wordInput = document.getElementById('wordInput').value.trim();
  if (wordInput) {
    const newUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?word=${encodeURIComponent(wordInput.toLowerCase())}`;
    window.history.pushState({ path: newUrl }, '', newUrl);
    displayMultipleWordsAndDefinitions();
  }
}

function playSyllable(syllable, startTime) {
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(syllableFrequency[syllable] || 0, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(1, startTime + 0.1);
  gainNode.gain.linearRampToValueAtTime(0, startTime + 0.5);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start(startTime);
  oscillator.stop(startTime + 0.6);
}

function playWord(word) {
  const syllables = word.match(/(do|re|mi|fa|sol|la|si)/g);
  if (!syllables) return;

  let startTime = audioCtx.currentTime + 0.1;
  syllables.forEach((syllable) => {
    playSyllable(syllable, startTime);
    startTime += 0.6;
  });
}

function playMultipleWords(words) {
  const wordsArray = words.split(' ');
  let delay = 0;

  wordsArray.forEach((word) => {
    setTimeout(() => playWord(word), delay);
    const syllables = word.match(/(do|re|mi|fa|sol|la|si)/g);
    delay += (syllables ? syllables.length * 600 : 0) + 500;
  });
}

document.addEventListener('DOMContentLoaded', function() {
  const playButton = document.getElementById('playSound');
  if (playButton) {
    playButton.addEventListener('click', () => {
      const word = getWordFromURL();
      if (word) {
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        playMultipleWords(word.toLowerCase());
      }
    });
  }

  displayMultipleWordsAndDefinitions();
});

// Translator Functions
function findFirstMatch(englishWord) {
  for (const [solresolWord, englishTranslations] of Object.entries(dictionary)) {
    const translationsArray = englishTranslations.toLowerCase().split(', ');
    if (translationsArray.some(translation => translation.split(/\s+/).includes(englishWord.toLowerCase()))) {
      return { solresolWord, englishTranslations };
    }
  }
  return { solresolWord: '', englishTranslations: `No translation found for "${englishWord}"` };
}

function translateText() {
  const text = document.getElementById('inputText').value.trim();
  const words = text.split(/\s+/);
  
  const firstMatches = words.map(word => findFirstMatch(word));
  const sentenceTranslation = firstMatches.map(match => match.solresolWord).join(' ').toLowerCase();
  const detailedTranslations = firstMatches.map(match => `<strong>${match.solresolWord}:</strong> ${match.englishTranslations}`).join('<br>');

  const translationUrl = `http://solresol.xyz/?word=${encodeURIComponent(sentenceTranslation)}`;
  const fullTranslation = `
    <p><strong>Sentence in Solresol:</strong> ${sentenceTranslation}</p>
    <p><strong>Word-by-word Translations:</strong><br>${detailedTranslations}</p>
    <p><a href="${translationUrl}" target="_blank" rel="noopener noreferrer">Show in Dictionary</a></p>
  `;
  document.getElementById('translation').innerHTML = fullTranslation;
}

// MIDI Key Display
const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88]; 
const solresol = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si'];

let currentNote = Math.floor(Math.random() * 7);

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('note').textContent = solresol[currentNote];
});

function playTone(frequency) {
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = 'sine';
  oscillator.frequency.value = frequency;

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(1, now + 0.1);
  gainNode.gain.linearRampToValueAtTime(0.3, now + 0.3);
  gainNode.gain.linearRampToValueAtTime(0.3, now + 0.7);
  gainNode.gain.linearRampToValueAtTime(0, now + 1);

  oscillator.start();
  setTimeout(() => oscillator.stop(), 1000);
}

window.addEventListener('keydown', function(event) {
  if (event.keyCode >= 49 && event.keyCode <= 55) {
    let inputNote = event.keyCode - 49;
    document.getElementById('input').textContent = solresol[inputNote];

    playTone(notes[inputNote]);

    if (inputNote === currentNote) {
      document.getElementById('message').textContent = 'Correct!';
      currentNote = Math.floor(Math.random() * 7);
      document.getElementById('note').textContent = solresol[currentNote];
    } else {
      document.getElementById('message').textContent = 'Incorrect, try again';
    }
  }
});

// MIDI Handling
if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(midiAccess => {
    for (var input of midiAccess.inputs.values()) {
      input.onmidimessage = midiMessage => {
        if (midiMessage.data[0] === 144 || midiMessage.data[0] === 128) {
          var noteNumber = midiMessage.data[1];
          var noteInfo = getNoteInfo(noteNumber);
          if (midiMessage.data[0] === 144 && midiMessage.data[2] !== 0) {
            document.getElementById('midiKey').innerText = noteInfo.name;
            document.body.style.backgroundColor = noteInfo.color;
          }
        }
      };
    }
  });

  function getNoteInfo(noteNumber) {
    var scalePattern = {
      'Do': '#c40233', 'Re': '#e16b1a', 'Mi': '#eac100',
      'Fa': '#00a368', 'Sol': '#00b2b0', 'La': '#0088bf', 'Si': '#624579'
    };
    var offset = (noteNumber - 36) % 12;
    var noteIndex = [0, 2, 4, 5, 7, 9, 11].indexOf(offset);
    if (noteIndex !== -1) {
      var noteName = Object.keys(scalePattern)[noteIndex];
      return { name: noteName, color: scalePattern[noteName] };
    } else {
      return { name: 'Unknown Note', color: 'initial' };
    }
  }
} else {
  document.getElementById('midiKey').innerText = 'MIDI not supported.';
}
</script>
</head>
<body>
<div class="wrapper">
<main>
  <!-- Top Container with Image and Guessing Game -->
  <section class="container2">
    <img src="http://solresol.xyz/Solresol2.png" alt="Solresol Logo">
    <div id="note"></div>
    <div id="input"></div>
    <div id="message"></div>
  </section>

  <!-- Translator Section -->
  <section class="container2 translator-container">
    <h2>English to Solresol Translator</h2>
    <textarea id="inputText" rows="4" placeholder="Enter English words (separated by spaces)"></textarea>
    <button onclick="translateText()">Translate</button>
    <div id="translation"></div>
  </section>

  <!-- Dictionary Lookup Section -->
  <section class="container">
    <h1>Lookup Solresol Word</h1>
    <form onsubmit="handleFormSubmit(event)">
      <div class="input-group">
        <input type="text" id="wordInput" placeholder="Enter Solresol words" required>
        <input type="submit" value="Look Up">
      </div>
    </form>

    <div id="word" class="word">...</div>
    <div id="plainWord" class="word">...</div>
    <div id="coloredSquaresWithText" class="word">...</div>
    <div id="coloredSquaresWithNumbers" class="word">...</div>
    <div id="coloredSquaresNoText" class="word">...</div>
    <div id="number" class="number"></div>
    <div id="syllableImages" class="word"></div>
    <div id="syllableImages2" class="word"></div>
    <div id="syllableImages3" class="word"></div>
    <div id="syllableImages4" class="word"></div>
    <div id="definition" class="definition"></div><br>
    <button id="playSound">Play Sound</button>
  </section>

  <!-- MIDI Key Display Section -->
  <section class="container">
    <h1>MIDI Key Display</h1>
    <div id="midiKey">Press a key on MIDI</div>
  </section>
</main>
</div>

<script src="https://williamedwardhahn.github.io/solresol/solresol_dictionary.js"></script>
</body>
</html>
